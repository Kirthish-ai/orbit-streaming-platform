apiVersion: apps/v1
kind: Deployment

metadata:
  name: orbit-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orbit-frontend

  template:
    metadata:
      labels:
        app: orbit-frontend

    spec:
      containers:
        - name: orbit-frontend
          image: orbit-frontend:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80